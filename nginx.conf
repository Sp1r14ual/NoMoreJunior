# Кофигурация с поддоменом и SSL сертификатами в файле nginx_subdomain.conf
user  root;
worker_processes  1;

events {
}

http {
    server {
        listen       80;
        server_name  127.0.0.1;

        location / {
            proxy_pass http://frontend:8501/;
        }

        location /api/ {
            proxy_pass http://backend:8000/;
        }
    }
}